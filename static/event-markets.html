<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Markets Tier 2 Explorer</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
  :root {
    --bg: #0a1220;
    --panel: #111c2e;
    --line: #243a5a;
    --text: #e6eef8;
    --muted: #8fa5c0;
    --accent: #6fb1ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 16px; }
  .title h1 { margin: 0; font-size: 22px; }
  .title p { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
  .bar {
    margin-top: 14px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px;
    display: grid;
    gap: 12px;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }
  .toggle-group { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .toggle-group button {
    border: 0;
    background: #0f1a2c;
    color: var(--text);
    padding: 8px 12px;
    cursor: pointer;
  }
  .toggle-group button.active { background: #1b3a68; }
  .hint { color: var(--muted); font-size: 12px; }
  .controls { display: grid; grid-template-columns: repeat(3, minmax(220px, 1fr)); gap: 10px; }
  .ctrl {
    background: #0d1828;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px;
  }
  .ctrl label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 6px; }
  .ctrl .row { display: grid; grid-template-columns: 1fr 120px; gap: 8px; align-items: center; }
  input[type="range"] { width: 100%; accent-color: var(--accent); }
  input[type="number"] {
    width: 100%;
    background: #0b1627;
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 6px;
  }
  .charts {
    margin-top: 14px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px;
  }
  .panel h3 { margin: 0 0 8px; font-size: 14px; }
  .plot { width: 100%; height: 390px; }
  .legend-note { margin-top: 6px; color: var(--muted); font-size: 12px; }
  @media (max-width: 960px) {
    .controls { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<script src="/static/nav.js"></script>
<div class="wrap">
  <div class="title">
    <h1>Event Markets — Tier 2</h1>
    <p>Paper-mode defaults, efficiency frontier (Figure 4), and feasibility map (Figure 5).</p>
  </div>

  <div class="bar">
    <div class="toggle-row">
      <div class="toggle-group">
        <button id="modePaper" type="button">Paper</button>
        <button id="modeExplore" type="button">Explore</button>
      </div>
      <div id="modeHint" class="hint">Explore mode: controls editable.</div>
    </div>

    <div class="controls">
      <div class="ctrl">
        <label for="liabilityRange">Liability</label>
        <div class="row">
          <input id="liabilityRange" type="range" min="20000000" max="200000000" step="1000000">
          <input id="liabilityNumber" type="number" min="20000000" max="200000000" step="1000000">
        </div>
      </div>

      <div class="ctrl">
        <label for="liquidityRange">Liquidity</label>
        <div class="row">
          <input id="liquidityRange" type="range" min="1000000" max="100000000" step="500000">
          <input id="liquidityNumber" type="number" min="1000000" max="100000000" step="500000">
        </div>
      </div>

      <div class="ctrl">
        <label for="trueProbabilityRange">True Probability (p)</label>
        <div class="row">
          <input id="trueProbabilityRange" type="range" min="0.01" max="0.99" step="0.01">
          <input id="trueProbabilityNumber" type="number" min="0.01" max="0.99" step="0.01">
        </div>
      </div>

      <div class="ctrl">
        <label for="marketPriceRange">Market Price</label>
        <div class="row">
          <input id="marketPriceRange" type="range" min="0.01" max="0.99" step="0.01">
          <input id="marketPriceNumber" type="number" min="0.01" max="0.99" step="0.01">
        </div>
      </div>

      <div class="ctrl">
        <label for="hedgeRatioRange">Target Hedge Ratio</label>
        <div class="row">
          <input id="hedgeRatioRange" type="range" min="0" max="1" step="0.01">
          <input id="hedgeRatioNumber" type="number" min="0" max="1" step="0.01">
        </div>
      </div>

      <div class="ctrl">
        <label for="simulationCountRange">Simulation Count (n)</label>
        <div class="row">
          <input id="simulationCountRange" type="range" min="1000" max="50000" step="1000">
          <input id="simulationCountNumber" type="number" min="1000" max="50000" step="1000">
        </div>
      </div>
    </div>
  </div>

  <div class="charts">
    <div class="panel">
      <h3 id="fig4Title">Figure 4 — Hedging Efficiency Frontier</h3>
      <div id="fig4" class="plot"></div>
    </div>
    <div class="panel">
      <h3 id="fig5Title">Figure 5 — Sportsbook Hedging Feasibility Map</h3>
      <div id="fig5" class="plot"></div>
      <div class="legend-note">No Effective Hedging | Partial Hedging | Meaningful Hedging</div>
    </div>
  </div>
</div>

<script>
const PAPER_DEFAULTS = {
  liability: 100000000,
  liquidity: 20000000,
  true_probability: 0.55,
  market_price: 0.52,
  target_hedge_ratio: 0.60,
  simulation_count: 10000,
};

const EXPLORE_DEFAULTS = {
  liability: 120000000,
  liquidity: 12000000,
  true_probability: 0.60,
  market_price: 0.58,
  target_hedge_ratio: 0.50,
  simulation_count: 20000,
};

let mode = "explore";
let exploreMemory = { ...EXPLORE_DEFAULTS };
let debounceId = null;

const bindings = {
  liability: ["liabilityRange", "liabilityNumber"],
  liquidity: ["liquidityRange", "liquidityNumber"],
  true_probability: ["trueProbabilityRange", "trueProbabilityNumber"],
  market_price: ["marketPriceRange", "marketPriceNumber"],
  target_hedge_ratio: ["hedgeRatioRange", "hedgeRatioNumber"],
  simulation_count: ["simulationCountRange", "simulationCountNumber"],
};

const queryMap = {
  liability: "liability",
  liquidity: "liquidity",
  true_probability: "p",
  market_price: "price",
  target_hedge_ratio: "hedge",
  simulation_count: "n",
};

function num(v, fallback, min, max, integer = false) {
  const n = integer ? parseInt(v, 10) : parseFloat(v);
  if (Number.isNaN(n)) return fallback;
  if (n < min || n > max) return fallback;
  return n;
}

function readStateFromUrl() {
  const q = new URLSearchParams(window.location.search);
  const s = {
    liability: num(q.get("liability"), EXPLORE_DEFAULTS.liability, 20000000, 200000000, true),
    liquidity: num(q.get("liquidity"), EXPLORE_DEFAULTS.liquidity, 1000000, 100000000, true),
    true_probability: num(q.get("p"), EXPLORE_DEFAULTS.true_probability, 0.01, 0.99, false),
    market_price: num(q.get("price"), EXPLORE_DEFAULTS.market_price, 0.01, 0.99, false),
    target_hedge_ratio: num(q.get("hedge"), EXPLORE_DEFAULTS.target_hedge_ratio, 0.0, 1.0, false),
    simulation_count: num(q.get("n"), EXPLORE_DEFAULTS.simulation_count, 1000, 50000, true),
  };
  return s;
}

function setInputs(state) {
  Object.entries(bindings).forEach(([k, [rangeId, numberId]]) => {
    document.getElementById(rangeId).value = state[k];
    document.getElementById(numberId).value = state[k];
  });
}

function getState() {
  return {
    liability: parseInt(document.getElementById("liabilityNumber").value, 10),
    liquidity: parseInt(document.getElementById("liquidityNumber").value, 10),
    true_probability: parseFloat(document.getElementById("trueProbabilityNumber").value),
    market_price: parseFloat(document.getElementById("marketPriceNumber").value),
    target_hedge_ratio: parseFloat(document.getElementById("hedgeRatioNumber").value),
    simulation_count: parseInt(document.getElementById("simulationCountNumber").value, 10),
  };
}

function writeUrlDebounced() {
  if (debounceId) clearTimeout(debounceId);
  debounceId = setTimeout(() => {
    const s = getState();
    const q = new URLSearchParams(window.location.search);
    Object.entries(queryMap).forEach(([k, qp]) => q.set(qp, s[k]));
    history.replaceState({}, "", `${location.pathname}?${q.toString()}`);
  }, 300);
}

function setPaperMode(enabled) {
  if (enabled) {
    exploreMemory = getState();
    mode = "paper";
    setInputs(PAPER_DEFAULTS);
  } else {
    mode = "explore";
    setInputs(exploreMemory);
  }

  const disable = enabled;
  Object.values(bindings).forEach(([rangeId, numberId]) => {
    document.getElementById(rangeId).disabled = disable;
    document.getElementById(numberId).disabled = disable;
  });

  document.getElementById("modePaper").classList.toggle("active", enabled);
  document.getElementById("modeExplore").classList.toggle("active", !enabled);
  document.getElementById("modeHint").textContent = enabled
    ? "Paper mode: sliders locked to canonical article defaults."
    : "Explore mode: controls editable.";

  renderAll();
}

function syncPair(changedId, otherId, key) {
  const value = document.getElementById(changedId).value;
  document.getElementById(otherId).value = value;
  if (mode === "explore") {
    exploreMemory[key] = getState()[key];
  }
  writeUrlDebounced();
  renderAll();
}

async function renderFigure4(state) {
  const res = await fetch("/api/tier2/frontier", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(state),
  });
  if (!res.ok) throw new Error("Failed to load Figure 4");
  const data = await res.json();

  const shallow = data.frontiers.shallow;
  const deep = data.frontiers.deep;

  const traceShallow = {
    type: "scatter",
    mode: "lines+markers",
    name: "shallow",
    x: shallow.map((r) => r.ev_sacrificed),
    y: shallow.map((r) => r.tail_reduction),
    customdata: shallow.map((r) => [r.hedge_size, r.liquidity_used, r.ev_sacrificed, r.tail_reduction]),
    line: { color: "#f59e0b", width: 2 },
    hovertemplate:
      "Hedge Size: %{customdata[0]:,.0f}<br>Liquidity Used: %{customdata[1]:.2%}<br>EV Change: %{customdata[2]:,.2f}<br>Tail-Risk Improvement: %{customdata[3]:,.2f}<extra>shallow</extra>",
  };
  const traceDeep = {
    type: "scatter",
    mode: "lines+markers",
    name: "deep",
    x: deep.map((r) => r.ev_sacrificed),
    y: deep.map((r) => r.tail_reduction),
    customdata: deep.map((r) => [r.hedge_size, r.liquidity_used, r.ev_sacrificed, r.tail_reduction]),
    line: { color: "#22c55e", width: 2 },
    hovertemplate:
      "Hedge Size: %{customdata[0]:,.0f}<br>Liquidity Used: %{customdata[1]:.2%}<br>EV Change: %{customdata[2]:,.2f}<br>Tail-Risk Improvement: %{customdata[3]:,.2f}<extra>deep</extra>",
  };

  Plotly.react("fig4", [traceShallow, traceDeep], {
    title: data.title,
    paper_bgcolor: "#0d1520",
    plot_bgcolor: "#0b1628",
    font: { color: "#d7e4f2" },
    xaxis: { title: "EV Sacrificed" },
    yaxis: { title: "Tail-Risk Improvement" },
    legend: { orientation: "h" },
    margin: { l: 60, r: 20, t: 60, b: 50 },
  }, { responsive: true, displayModeBar: false });
}

async function renderFigure5(state) {
  const res = await fetch("/api/tier2/feasibility", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(state),
  });
  if (!res.ok) throw new Error("Failed to load Figure 5");
  const data = await res.json();

  const labels = [
    data.labels.no_effective,
    data.labels.partial,
    data.labels.meaningful,
  ];

  const heat = {
    type: "contour",
    x: data.liabilities,
    y: data.liquidities,
    z: data.region_grid,
    colorscale: [
      [0.0, "#7f1d1d"],
      [0.499, "#f59e0b"],
      [1.0, "#16a34a"],
    ],
    contours: { coloring: "heatmap", start: 0, end: 2, size: 1, showlabels: false },
    showscale: false,
    hovertemplate:
      "Liability: %{x:,.0f}<br>Liquidity: %{y:,.0f}<br>Region: %{z}<extra></extra>",
  };

  const layout = {
    title: data.title,
    paper_bgcolor: "#0d1520",
    plot_bgcolor: "#0b1628",
    font: { color: "#d7e4f2" },
    xaxis: { title: "Liability" },
    yaxis: { title: "Liquidity" },
    margin: { l: 60, r: 20, t: 60, b: 50 },
    shapes: [
      {
        type: "line",
        x0: data.current.liability,
        x1: data.current.liability,
        y0: data.liquidities[0],
        y1: data.liquidities[data.liquidities.length - 1],
        line: { color: "#ffffff", width: 1, dash: "dot" },
      },
      {
        type: "line",
        x0: data.liabilities[0],
        x1: data.liabilities[data.liabilities.length - 1],
        y0: data.current.liquidity,
        y1: data.current.liquidity,
        line: { color: "#ffffff", width: 1, dash: "dot" },
      },
    ],
    annotations: [
      { xref: "paper", yref: "paper", x: 0.01, y: 1.11, text: labels[0], showarrow: false, font: { size: 11, color: "#fca5a5" } },
      { xref: "paper", yref: "paper", x: 0.35, y: 1.11, text: labels[1], showarrow: false, font: { size: 11, color: "#fcd34d" } },
      { xref: "paper", yref: "paper", x: 0.68, y: 1.11, text: labels[2], showarrow: false, font: { size: 11, color: "#86efac" } },
    ],
  };

  Plotly.react("fig5", [heat], layout, { responsive: true, displayModeBar: false });
}

async function renderAll() {
  const state = getState();
  try {
    await Promise.all([renderFigure4(state), renderFigure5(state)]);
  } catch (err) {
    console.error(err);
  }
}

function setupBinding(key) {
  const [rangeId, numberId] = bindings[key];
  const range = document.getElementById(rangeId);
  const number = document.getElementById(numberId);
  range.addEventListener("input", () => syncPair(rangeId, numberId, key));
  number.addEventListener("input", () => syncPair(numberId, rangeId, key));
}

Object.keys(bindings).forEach(setupBinding);

document.getElementById("modePaper").addEventListener("click", () => setPaperMode(true));
document.getElementById("modeExplore").addEventListener("click", () => setPaperMode(false));

const initialFromUrl = readStateFromUrl();
exploreMemory = { ...initialFromUrl };
setInputs(initialFromUrl);
setPaperMode(false);
writeUrlDebounced();
</script>
</body>
</html>
