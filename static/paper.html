<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventRisk.ai Paper Figures</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <body>
    <div class="app-shell">
      <header class="top-nav">
        <a href="/explainer" class="wordmark">EventRisk</a>

      <main class="page-main">

          <button class="preset-btn active" data-preset="superbowl">Super Bowl</button>

      <footer class="page-footer">
        Citation: EventRisk.ai (2026). Risk Transfer Under Liquidity Constraints.
